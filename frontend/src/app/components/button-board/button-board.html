<div class="button-board">
  <!-- Hold Buttons Row -->
  <div class="hold-row">
    <button class="hold-btn" (click)="gameService.toggleHold(0)"></button>
    <span class="hc-label">-H/C-</span>
    <button class="hold-btn" (click)="gameService.toggleHold(1)"></button>
    <span class="hc-label">-H/C-</span>
    <button class="hold-btn" (click)="gameService.toggleHold(2)"></button>
    <span class="hc-label">-H/C-</span>
    <button class="hold-btn" (click)="gameService.toggleHold(3)"></button>
    <span class="hc-label">-H/C-</span>
    <button class="hold-btn" (click)="gameService.toggleHold(4)"></button>
  </div>

  <!-- Bottom Control Buttons -->
  <div class="controls-row">
    <!-- NEW GAME -->
    <div class="control-group horizontal">
      <button (click)="gameService.newGame()" class="small-round-btn"></button>
      <span class="btn-label">New Game</span>
    </div>

    <!-- DEAL DRAW -->
    <div class="control-group deal-group horizontal">
      <div class="btn-well">
        <button (click)="onDealDraw()" class="deal-draw-btn"></button>
      </div>
      <span class="btn-label large">Deal/Draw</span>
    </div>

    <!-- SOUND & PLAYER -->
    <div class="control-group-row">
      <div class="control-group">
        <button (click)="gameService.toggleSound()" class="small-round-btn"></button>
        <span class="btn-label">Sound</span>
      </div>
      <div class="control-group">
        <button (click)="gameService.switchPlayer()" class="small-round-btn"></button>
        <span class="btn-label">Player</span>
      </div>
    </div>
  </div>
</div>
