<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark Button Slate Background -->
  <rect width="1024" height="1024" rx="200" fill="#3a414e"/>
  
  <!-- LCD Green Background Circle -->
  <!-- Diameter 700 (approx 68% of canvas) to sit right at the edge of the safe zone -->
  <circle cx="512" cy="512" r="350" fill="#97ab8d"/>
  
  <!-- Club Icon -->
  <!-- Font size 600 (approx 58% of canvas) ensures it is fully within the 66% safe zone -->
  <!-- Adjusted Y to 540 to visually center the 'heavy' base of the club -->
  <text x="512" y="540" font-family="sans-serif" font-weight="bold" font-size="600" text-anchor="middle" dominant-baseline="central" fill="#3a414e">♣</text>
</svg>
